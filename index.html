<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа 3-4 Низяев: CSS Аккордеон</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="accordion">
        
        <div class="accordion__item">
      
            <input type="radio" name="accordion" id="item1" class="accordion__input" checked>
         
            <label for="item1" class="accordion__label">
                <span class="accordion__title">Красивый закат</span>
                <span class="accordion__icon"></span>
            </label>
   
            <div class="accordion__content">
                <img src="images/sunset.jpg" alt="Закат на море" class="accordion__image">
            </div>
        </div>
        
        <div class="accordion__item">
            <input type="radio" name="accordion" id="item2" class="accordion__input">
            
            <label for="item2" class="accordion__label">
                <span class="accordion__title">Горный пейзаж</span>
                <span class="accordion__icon"></span>
            </label>
            
            <div class="accordion__content">
                <img src="images/mountains.jpg" alt="Горы" class="accordion__image">
            </div>
        </div>
        
        <div class="accordion__item">
            <input type="radio" name="accordion" id="item3" class="accordion__input">
            
            <label for="item3" class="accordion__label">
                <span class="accordion__title">Лесное озеро</span>
                <span class="accordion__icon"></span>
            </label>
            
            <div class="accordion__content">
                <img src="images/lake.jpg" alt="Лесное озеро" class="accordion__image">
            </div>
        </div>
        
        <div class="accordion__item">
            <input type="radio" name="accordion" id="item4" class="accordion__input">
            
            <label for="item4" class="accordion__label">
                <span class="accordion__title">Городской пейзаж</span>
                <span class="accordion__icon"></span>
            </label>
            
            <div class="accordion__content">
                <img src="images/city.jpg" alt="Ночной город" class="accordion__image">
            </div>
        </div>
        
    </div>
</body>
</html>
